<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Billing Calculator</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="container">

        <h1>🛒 Billing Calculator</h1>

        <div class="input-group">
            <label>Customer Name</label>
            <input type="text" id="name" placeholder="Enter customer name">
        </div>

        <div class="input-group">
            <label>Product Name</label>
            <input type="text" id="product" placeholder="Enter product name">
        </div>

        <div class="input-group">
            <label>Price (₹)</label>
            <input type="number" id="price" placeholder="Enter price">
        </div>

        <div class="input-group">
            <label>Quantity</label>
            <input type="number" id="quantity" placeholder="Enter quantity">
        </div>

        <button onclick="calculateBill()">Generate Bill</button>

        <div id="result"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
