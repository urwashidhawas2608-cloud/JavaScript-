<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Grading System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

body{
    background:linear-gradient(135deg,#1E3C72,#2A5298);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.container{
    width:450px;
    background:#fff;
    border-radius:15px;
    padding:30px;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
}

.header{
    text-align:center;
    margin-bottom:25px;
}

.header h1{
    color:#1E3C72;
    margin-bottom:8px;
}

.header p{
    color:#666;
    font-size:15px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:6px;
    font-weight:600;
    color:#333;
}

.input-group input{
    width:100%;
    padding:12px;
    border:2px solid #dcdcdc;
    border-radius:8px;
    font-size:15px;
    transition:.3s;
}

.input-group input:focus{
    border-color:#2A5298;
    outline:none;
}

button{
    width:100%;
    padding:14px;
    border:none;
    background:#1E3C72;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#16325c;
}

#result{
    margin-top:25px;
    display:none;
}

.result-card{
    background:#f8f9fa;
    border-radius:10px;
    padding:20px;
    border-left:6px solid #1E3C72;
}

.result-card h2{
    text-align:center;
    color:#1E3C72;
    margin-bottom:15px;
}

table{
    width:100%;
    border-collapse:collapse;
}

table td{
    padding:10px;
    border-bottom:1px solid #ddd;
}

table td:first-child{
    font-weight:bold;
    width:45%;
}

.grade{
    font-size:22px;
    font-weight:bold;
    color:#0d6efd;
}

.pass{
    color:green;
    font-weight:bold;
}

.fail{
    color:red;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>Student Grading System</h1>
<p>JavaScript Practical - Form Validation & Control Structures</p>
</div>

<div class="input-group">
<label>Student Name</label>
<input type="text" id="studentName" placeholder="Enter Student Name">
</div>

<div class="input-group">
<label>PRN Number</label>
<input type="text" id="prn" placeholder="Enter PRN Number">
</div>

<div class="input-group">
<label>Subject Name</label>
<input type="text" id="subject" placeholder="Enter Subject Name">
</div>

<div class="input-group">
<label>Marks Obtained</label>
<input type="number" id="marks" placeholder="Enter Marks (0 - 100)">
</div>

<button onclick="calculateGrade()">Generate Result</button>

<div id="result"></div>

</div>

<script>

function calculateGrade(){

let studentName=document.getElementById("studentName").value.trim();
let prn=document.getElementById("prn").value.trim();
let subject=document.getElementById("subject").value.trim();
let marks=document.getElementById("marks").value.trim();

if(studentName==""){
    alert("Please enter Student Name.");
    return;
}

if(prn==""){
    alert("Please enter PRN Number.");
    return;
}

if(subject==""){
    alert("Please enter Subject Name.");
    return;
}

if(marks==""){
    alert("Please enter Marks.");
    return;
}

marks=Number(marks);

if(marks<0 || marks>100){
    alert("Marks should be between 0 and 100.");
    return;
}

let grade="";
let remark="";
let status="";
let statusClass="";

if(marks>=90){
    grade="A+";
    remark="Outstanding Performance";
}
else if(marks>=80){
    grade="A";
    remark="Excellent";
}
else if(marks>=70){
    grade="B";
    remark="Very Good";
}
else if(marks>=60){
    grade="C";
    remark="Good";
}
else if(marks>=50){
    grade="D";
    remark="Needs Improvement";
}
else{
    grade="F";
    remark="Failed";
}

if(marks>=50){
    status="PASS";
    statusClass="pass";
}
else{
    status="FAIL";
    statusClass="fail";
}

document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML=`

<div class="result-card">

<h2>Result Summary</h2>

<table>

<tr>
<td>Student Name</td>
<td>${studentName}</td>
</tr>

<tr>
<td>PRN Number</td>
<td>${prn}</td>
</tr>

<tr>
<td>Subject Name</td>
<td>${subject}</td>
</tr>

<tr>
<td>Marks Obtained</td>
<td>${marks} / 100</td>
</tr>

<tr>
<td>Percentage</td>
<td>${marks}%</td>
</tr>

<tr>
<td>Grade</td>
<td class="grade">${grade}</td>
</tr>

<tr>
<td>Result</td>
<td class="${statusClass}">${status}</td>
</tr>

<tr>
<td>Remarks</td>
<td>${remark}</td>
</tr>

</table>

</div>

`;

}

</script>

</body>
</html>
